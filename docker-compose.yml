services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-galaxy_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-galaxy_local}
      POSTGRES_USER: ${POSTGRES_USER:-galaxy}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - galaxy_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - galaxy_redis_data:/data

  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - '127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025'
      - '127.0.0.1:${MAILPIT_WEB_PORT:-8025}:8025'

volumes:
  galaxy_postgres_data:
  galaxy_redis_data:
